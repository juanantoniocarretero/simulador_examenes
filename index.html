<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Certificaciones Pro</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    
    <link rel="apple-touch-icon" href="img/icon-512.png">

    <link rel="icon" type="image/svg+xml" href="img/icon.svg">
    <link rel="stylesheet" href="css/style.css">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.log('Error SW', err));
            });
        }
    </script>
</head>

<body>
<div style="text-align: center; margin-top: 20px;">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open-check">
        <path d="M12 21V7"/>
        <path d="m16 12 2 2 4-4"/>
        <path d="M22 6V4a1 1 0 0 0-1-1h-5a4 4 0 0 0-4 4 4 4 0 0 0-4-4H3a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1h6a3 3 0 0 1 3 3 3 3 0 0 1 3-3h6a1 1 0 0 0 1-1v-1.3"/>
    </svg>
</div>
    <div id="quiz-card">
        <div id="setup">
            <h1>Simulador Certificaciones</h1>

            <label class="label-group">Selecciona el Examen:</label>
            <select id="exam-select" class="btn">
                <option value="json/lpic101.json">LPIC-1 (Examen 101)</option>
                <option value="json/lpic102.json">LPIC-1 (Examen 102)</option>
                <option value="json/lpic201.json">LPIC-2 (Examen 201)</option>
                <option value="json/lpic202.json">LPIC-2 (Examen 202)</option>
            </select>

            <label class="label-group">Cantidad de Preguntas:</label>
            <select id="num-questions" class="btn"></select>

            <label class="label-group">Tiempo Límite:</label>
            <select id="timer-select" class="btn"></select>

            <button class="btn" onclick="initQuiz(false)"
                style="background:var(--accent); color:white; border:none; margin-top:20px;">
                Iniciar Simulación
            </button>

            <div id="history-section">
                <h3>Últimos Resultados</h3>
                <div id="history-list"></div>
            </div>
        </div>

        <div id="quiz" class="hidden">
            <div class="stats-bar">
                <div style="display: flex; flex-direction: column; width: 65%;">
                    <span id="progress-text">Pregunta 1</span>
                    <div class="progress-container">
                        <div id="progress-bar"></div>
                    </div>
                    <span id="timer-display">⏱️ 00:00</span>
                </div>

                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="stat-item">✅ <span id="count-success" class="stat-success">0</span></div>
                    <div class="stat-item">❌ <span id="count-error" class="stat-error">0</span></div>
                </div>
            </div>

            <h2 id="question-text" style="font-size: 1.2rem; min-height: 60px;">Cargando...</h2>

            <div id="ans-container"></div>

            <p id="feedback" style="min-height: 1.5em; margin-top: 15px; font-weight: bold;"></p>

            <div class="action-controls" style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="main-btn" class="btn" onclick="handleMainAction()"
                    style="flex: 2; margin: 0;">Verificar</button>
                <button id="flag-btn" class="btn" onclick="toggleFlag()"
                    style="flex: 1; margin: 0; background: #f39c12; color: white; border: none;">
                    🚩 Duda
                </button>
            </div>

            <button id="exit-btn" class="btn-exit" onclick="confirmExit()">
                Finalizar intento y ver resultados
            </button>
        </div>

        <div id="results" class="hidden">
            <h1>Test Finalizado</h1>
            <div style="text-align: center;">
                <div id="score-display" style="font-size: 4rem; font-weight: bold; color: var(--primary);">0</div>
                <p id="final-msg" style="margin-bottom: 25px;"></p>

                <div id="report-container" style="margin-bottom: 30px;"></div>

                <div id="flagged-review" class="hidden"
                    style="margin: 20px 0; text-align: left; background: #fff3cd; padding: 15px; border-radius: 8px; border: 1px solid #ffeeba;">
                    <h4 style="margin-top: 0; color: #856404;">⚠️ Marcadas para revisión:</h4>
                    <ul id="flagged-list" style="padding-left: 20px; color: #856404; font-size: 0.9rem;"></ul>
                </div>

                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button id="retry-failed-btn" class="btn hidden" onclick="initQuiz(true)"
                        style="background:var(--success); color:white; border:none;">
                        Repetir preguntas falladas
                    </button>
                    <button class="btn" onclick="location.reload()"
                        style="background:var(--accent); color:white; border:none;">
                        Volver al inicio
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
